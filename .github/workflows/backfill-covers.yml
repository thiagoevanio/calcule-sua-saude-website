name: 🖼️ Capas retroativas (uma vez)

# Gera capa única para os artigos antigos. Rode manualmente em Actions > Run workflow.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backfill-covers
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🖼️ Gerar capas retroativas
        run: python scripts/backfill_covers.py

      - name: 🔎 Reconstruir sitemap (opcional)
        run: node scripts/rebuild-sitemap.mjs || true

      - name: 📤 Commit e push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add artigos/ artigos.html sitemap.xml img/
          if git diff --cached --quiet; then
            echo "Nenhuma mudança."
          else
            git commit -m "🖼️ [AUTO] Capas retroativas para artigos antigos" --no-verify
            git push origin ${{ github.ref_name }}
          fi
